server {
    listen 80;
    listen 443 ssl;
    server_name localhost;
    server_tokens off; # 🛡️ Oculta la versión de Nginx (Mitiga 'Server Version Disclosure')

    # Certificados SSL (Cambiarlos por los de Certbot en producción)
    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Optimización SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Raíz donde están los archivos estáticos
    root /usr/share/nginx/html;
    index index.html;

    # 🛡️ Cabeceras de Seguridad Globales
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 🛡️ Content Security Policy (Ajustada para React + Google Fonts + API Local + Mapas)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' http://192.168.1.53:8000 http://localhost:8000 https://raw.githubusercontent.com https://unpkg.com https://cdn.jsdelivr.net;" always;

    # Manejo de rutas para React Router (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso para la API (Backend en FastAPI)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🕵️‍♂️ Proxy para rutas de Honeypot (Trampas)
    location ~* ^/(admin\.php|wp-admin|\.env|config\.php|phpmyadmin) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 📡 Soporte para WebSockets (Real-time Threat Map)
    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Caché para recursos estáticos
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
        
        # Repetimos cabeceras de seguridad aquí porque Nginx no las hereda si se define un add_header local
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}

