name: Deployment Pipeline

on:
  push:
    branches: [ "feature/monitoreo-promtail", "main" ]

jobs:
  deploy:
    name: Build & Deploy to LXC 2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "🚀 Iniciando despliegue en LXC 2 (192.168.1.53)..."
            cd Portfolio
            git fetch origin
            git checkout feature/monitoreo-promtail
            git pull origin feature/monitoreo-promtail
            docker compose up -d --build
            echo "✅ Despliegue completado con éxito."
