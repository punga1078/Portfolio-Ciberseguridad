services:
  db:
    image: postgres:15-alpine
    container_name: blog-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: blog-backend
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      args:
        # Por defecto usará desarrollo, pero lo podemos sobreescribir
        - MODE=development
    container_name: blog-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: